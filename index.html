<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* DEFINICIÓN MAESTRA DE LOS DOS TEMAS (Intercambiables en vivo) */
        .theme-dark {
            --bg-body: #0f172a;
            --bg-app: #121214;
            --bg-card: #18181b;
            --text-title: #ffffff;
            --text-desc: #a1a1aa;
            --border: #27272a;
            --bg-input: #27272a;
            --text-input: #e4e4e7;
            --bg-btn: #ffffff;
            --text-btn: #121214;
        }
        .theme-light {
            --bg-body: #e2e8f0;
            --bg-app: #ffffff;
            --bg-card: #f4f4f5;
            --text-title: #0f172a;
            --text-desc: #52525b;
            --border: #e4e4e7;
            --bg-input: #ffffff;
            --text-input: #18181b;
            --bg-btn: #18181b;
            --text-btn: #ffffff;
        }

        /* Transiciones fluidas para un efecto visual premium */
        body { background-color: var(--bg-body); font-family: system-ui, -apple-system, sans-serif; transition: background 0.4s ease; }
        .app-container { max-width: 450px; margin: 0 auto; background-color: var(--bg-app); min-height: 100vh; position: relative; transition: background 0.4s ease; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Enlace de elementos a las variables */
        .dyn-card { background-color: var(--bg-card); border-color: var(--border); transition: all 0.4s ease; }
        .dyn-text-title { color: var(--text-title); transition: color 0.4s ease; }
        .dyn-text-desc { color: var(--text-desc); transition: color 0.4s ease; }
        .dyn-border { border-color: var(--border); transition: border-color 0.4s ease; }
        .dyn-input { background-color: var(--bg-input); border-color: var(--border); color: var(--text-input); transition: all 0.4s ease; }
        .dyn-btn { background-color: var(--bg-btn); color: var(--text-btn); transition: all 0.4s ease; }

        select:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body class="theme-dark">

    <div class="app-container pb-28">
        <div class="h-32 bg-zinc-900 relative flex items-center justify-center">
            <div class="absolute inset-0 opacity-20 bg-gradient-to-br from-[#e51d74] via-[#00c2cb] to-[#facc15]"></div>
        </div>

        <div class="px-6 text-center -mt-12 relative z-10">
            <div id="wrapper-logo" class="w-24 h-24 mx-auto rounded-full p-1 border shadow-xl flex items-center justify-center overflow-hidden dyn-card dyn-border">
                <div id="logo-loader" class="text-xs dyn-text-desc">...</div>
            </div>
            <h1 id="dyn-nombre" class="mt-3 text-xl font-bold tracking-tight dyn-text-title">Cargando...</h1>
            <p id="dyn-descripcion" class="text-xs mt-1 dyn-text-desc">Por favor espera un momento</p>
        </div>

        <div class="mt-6 border-b sticky top-0 backdrop-blur z-20 dyn-border" style="background-color: var(--bg-app); opacity: 0.95;">
            <div id="tabs-container" class="flex overflow-x-auto px-6 gap-6 text-sm font-bold py-2 hide-scrollbar">
                </div>
        </div>

        <div id="catalog-container" class="p-4 space-y-4"></div>

        <div class="fixed bottom-5 left-0 right-0 max-w-[450px] mx-auto px-4 z-30">
            <button id="btn-whatsapp" class="w-full font-bold text-sm py-4 px-6 rounded-xl shadow-2xl flex justify-between items-center transition-all dyn-btn">
                <span>Enviar pedido a WhatsApp</span>
                <span id="counter" class="bg-pink-600 text-white px-2.5 py-0.5 rounded text-xs font-bold">0 ítems</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyCYFyZbr_wM5FAMVo_hS1gY4hdAK-q41pk",
  authDomain: "suvlic-catalogo.firebaseapp.com",
  projectId: "suvlic-catalogo",
  storageBucket: "suvlic-catalogo.firebasestorage.app",
  messagingSenderId: "944310483909",
  appId: "1:944310483909:web:81852b2a7edb73e807e9ac"
};
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let catActiva = "";
        let listadoCompleto = [];
        let carrito = [];
        let telefonoWhatsAppGlobal = "584120000000";

        // 1. ESCUCHAR IDENTIDAD VISUAL Y TEMA EN TIEMPO REAL ⚡
        onSnapshot(doc(db, "configuracion", "perfil"), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("dyn-nombre").textContent = data.nombre || "Tu Tienda";
                document.getElementById("dyn-descripcion").textContent = data.descripcion || "";
                document.title = data.nombre || "Catálogo";
                telefonoWhatsAppGlobal = data.telefono || telefonoWhatsAppGlobal;

                // CAMBIO DE TEMA INSTANTÁNEO
                const temaElegido = data.tema || "oscuro";
                if (temaElegido === "claro") {
                    document.body.className = "theme-light";
                } else {
                    document.body.className = "theme-dark";
                }

                if (data.logoUrl) {
                    document.getElementById("wrapper-logo").innerHTML = `<img src="${data.logoUrl}" class="w-full h-full object-cover rounded-full">`;
                } else {
                    document.getElementById("wrapper-logo").innerHTML = `<div class="text-2xl">🛍️</div>`;
                }
                render(); // Re-renderizar para ajustar bordes activos de pestañas
            }
        });

        // 2. ESCUCHAR CATEGORÍAS
        onSnapshot(collection(db, "categorias"), (snapshot) => {
            const tabsContainer = document.getElementById("tabs-container");
            tabsContainer.innerHTML = "";
            const docs = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.orden - b.orden);

            if(docs.length > 0 && !catActiva) {
                catActiva = docs[0].id;
            }

            docs.forEach(cat => {
                const btn = document.createElement("button");
                btn.id = `t-${cat.id}`;
                
                // Aplicar estilo activo o inactivo usando variables CSS de manera inteligente
                if (catActiva === cat.id) {
                    btn.className = "pb-2 whitespace-nowrap dyn-text-title border-b-2 border-[var(--text-title)]";
                } else {
                    btn.className = "pb-2 whitespace-nowrap dyn-text-desc border-b-2 border-transparent";
                }

                btn.textContent = cat.nombre.toUpperCase();
                btn.onclick = () => {
                    catActiva = cat.id;
                    render();
                };
                tabsContainer.appendChild(btn);
            });
            render();
        });

        // 3. ESCUCHAR PRODUCTOS
        onSnapshot(collection(db, "productos"), (snap) => {
            listadoCompleto = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            render();
        });

        function render() {
            // Re-sincronizar clases en pestañas de categorías superiores
            const tabsButtons = document.querySelectorAll("#tabs-container button");
            tabsButtons.forEach(btn => {
                if (btn.id === `t-${catActiva}`) {
                    btn.className = "pb-2 whitespace-nowrap dyn-text-title border-b-2 border-[var(--text-title)]";
                } else {
                    btn.className = "pb-2 whitespace-nowrap dyn-text-desc border-b-2 border-transparent";
                }
            });

            const container = document.getElementById("catalog-container");
            container.innerHTML = "";
            const filtrados = listadoCompleto.filter(p => p.categoriaId === catActiva && p.activo);

            if (filtrados.length === 0) {
                container.innerHTML = `<p class="text-center text-sm py-8 dyn-text-desc">No hay artículos en esta categoría.</p>`;
                return;
            }

            filtrados.forEach(p => {
                const card = document.createElement("div");
                card.className = "border rounded-2xl p-4 flex flex-col gap-3 dyn-card dyn-border";
                
                let htmlSelects = "";
                if (p.caracteristicas && p.caracteristicas.length > 0) {
                    htmlSelects = `<div class="mt-2 space-y-3">`;
                    p.caracteristicas.forEach((feat, index) => {
                        const isDisabled = index > 0 ? "disabled" : "";
                        htmlSelects += `
                            <div class="flex flex-col gap-1">
                                <label class="text-[10px] font-bold uppercase tracking-wider dyn-text-desc">Paso ${index + 1}: ${feat.titulo}</label>
                                <select 
                                    id="select-${p.id}-${index}" 
                                    data-prod="${p.id}" 
                                    data-index="${index}"
                                    data-titulo="${feat.titulo}"
                                    onchange="evaluarPaso(this, '${p.id}', ${index}, ${p.caracteristicas.length})"
                                    class="text-xs rounded-xl p-2.5 focus:outline-none w-full border dyn-input"
                                    ${isDisabled}
                                >
                                    <option value="" disabled selected>-- Selecciona opción --</option>
                                    ${feat.opciones.map(o => `<option value="${o}">${o}</option>`).join('')}
                                </select>
                            </div>
                        `;
                    });
                    htmlSelects += `</div>`;
                }

                card.innerHTML = `
                    <div class="flex gap-4 items-start">
                        <div class="flex-1">
                            <h3 class="font-bold text-base leading-tight dyn-text-title">${p.nombre}</h3>
                            <p class="text-xs mt-1 leading-relaxed dyn-text-desc">${p.descripcion}</p>
                        </div>
                        <div class="w-16 h-16 flex-shrink-0 rounded-xl overflow-hidden border dyn-border" style="background-color: var(--bg-body)">
                            <img src="${p.imagenUrl || 'https://via.placeholder.com/150'}" class="w-full h-full object-cover">
                        </div>
                    </div>
                    ${htmlSelects}
                    <div id="control-${p.id}" class="hidden mt-2 pt-3 border-t flex items-center justify-between gap-4 dyn-border">
                        <div class="flex items-center rounded-xl border dyn-input">
                            <button onclick="cambiarCantidadInput('${p.id}', -1)" class="font-bold px-3 py-1.5 hover:text-red-400 text-sm dyn-text-title">-</button>
                            <input id="cant-${p.id}" type="number" value="1" min="1" readonly class="w-10 bg-transparent text-center text-xs font-bold focus:outline-none dyn-text-title">
                            <button onclick="cambiarCantidadInput('${p.id}', 1)" class="font-bold px-3 py-1.5 hover:text-emerald-400 text-sm dyn-text-title">+</button>
                        </div>
                        <button onclick="agregarAlCarrito('${p.id}', '${p.nombre}', ${p.caracteristicas ? p.caracteristicas.length : 0})" class="flex-1 text-xs font-bold py-3 px-4 rounded-xl shadow text-center dyn-btn">
                            Añadir combinación
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.evaluarPaso = (selectElement, prodId, currentIndex, totalSteps) => {
            if (selectElement.value !== "") {
                const nextIndex = currentIndex + 1;
                if (nextIndex < totalSteps) {
                    const nextSelect = document.getElementById(`select-${prodId}-${nextIndex}`);
                    if (nextSelect) nextSelect.disabled = false;
                } else {
                    document.getElementById(`control-${prodId}`).classList.remove("hidden");
                }
            }
        }

        window.cambiarCantidadInput = (prodId, cambio) => {
            const input = document.getElementById(`cant-${prodId}`);
            let val = parseInt(input.value) + cambio;
            if (val < 1) val = 1;
            input.value = val;
        }

        window.agregarAlCarrito = (prodId, nombreProducto, totalSteps) => {
            const cantidad = parseInt(document.getElementById(`cant-${prodId}`).value);
            const opcionesSeleccionadas = [];

            for (let i = 0; i < totalSteps; i++) {
                const select = document.getElementById(`select-${prodId}-${i}`);
                opcionesSeleccionadas.push(`${select.getAttribute("data-titulo")}: ${select.value}`);
            }

            const existeIndex = carrito.findIndex(item => item.id === prodId && JSON.stringify(item.opciones) === JSON.stringify(opcionesSeleccionadas));
            if (existeIndex > -1) {
                carrito[existeIndex].cantidad += cantidad;
            } else {
                carrito.push({ id: prodId, nombre: nombreProducto, opciones: opcionesSeleccionadas, cantidad: cantidad });
            }

            alert(`¡Guardado en el pedido!`);
            render();
            const totalItems = carrito.reduce((sum, item) => sum + item.cantidad, 0);
            document.getElementById("counter").textContent = `${totalItems} ítems`;
        }

        document.getElementById("btn-whatsapp").onclick = () => {
            if (carrito.length === 0) return alert("Configura y añade algún artículo.");
            let texto = `¡Hola! 👋 Quiero procesar este pedido desde el catálogo digital:\n\n`;
            carrito.forEach((item, index) => {
                texto += `📦 *${index + 1}. ${item.nombre}* (Cant: ${item.cantidad})\n`;
                item.opciones.forEach(opt => texto += `   ↳ ${opt}\n`);
                texto += `\n`;
            });
            window.open(`https://api.whatsapp.com/send?phone=${telefonoWhatsAppGlobal}&text=${encodeURIComponent(texto)}`, "_blank");
        }
    </script>
</body>
</html>
