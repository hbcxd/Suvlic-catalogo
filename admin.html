<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suvlic - Panel Administrativo Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { width: 6px; }
        .hide-scrollbar::-webkit-scrollbar-track { background: #0b0f19; border-radius: 8px; }
        .hide-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 8px; }
        .bg-tornasol-suvlic { background: linear-gradient(135deg, #d946ef 0%, #22d3ee 50%, #facc15 100%); }
    </style>
</head>
<body class="bg-[#0b0f19] text-slate-100 min-h-screen flex flex-col justify-center items-center p-4">

    <!-- [PANTALLA DE LOGIN] -->
    <div id="login-screen" class="w-full max-w-md bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-2xl space-y-6">
        <div class="text-center">
            <span class="text-4xl">🔐</span>
            <h2 class="text-xl font-bold text-white mt-2">Acceso Administrativo</h2>
            <p class="text-xs text-slate-400 mt-1">Introduce tus credenciales para gestionar el catálogo</p>
        </div>
        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-xs text-slate-400 mb-1">Correo Electrónico</label>
                <input type="email" id="l-email" required placeholder="admin@suvlic.com" class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-cyan-400 transition-colors">
            </div>
            <div>
                <label class="block text-xs text-slate-400 mb-1">Contraseña</label>
                <input type="password" id="l-password" required placeholder="••••••••" class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl p-3 text-sm text-white focus:outline-none focus:border-fuchsia-400 transition-colors">
            </div>
            <button type="submit" id="btn-login" class="w-full bg-gradient-to-r from-fuchsia-500 via-cyan-400 to-yellow-400 hover:opacity-90 text-slate-900 font-extrabold text-sm py-3 rounded-xl transition-all shadow-[0_0_15px_rgba(34,211,238,0.2)]">
                Iniciar Sesión
            </button>
        </form>
    </div>

    <div id="admin-panel" class="hidden w-full max-w-2xl mx-auto space-y-6 my-4">
        
        <div class="bg-slate-900 rounded-2xl p-4 border border-slate-800 shadow-xl flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_8px_rgba(34,211,238,0.8)]"></span>
                <p id="user-display" class="text-xs font-semibold text-slate-300">Sesión activa</p>
            </div>
            <button id="btn-logout" class="bg-slate-800 hover:bg-red-500 hover:text-white text-slate-300 text-xs font-bold py-1.5 px-4 rounded-xl border border-slate-700 transition-all">
                Cerrar Sesión ↩
            </button>
        </div>

        <!-- [CONFIGURACIÓN ACTUALIZADA] -->
        <div class="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-xl">
            <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2 border-b border-slate-800 pb-3">
                <span>🎨</span> Identidad, Datos y Tema
            </h2>
            <form id="config-form" class="space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Nombre de la Empresa / Tienda</label>
                        <input type="text" id="c-nombre" required class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-cyan-400">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">WhatsApp Corporativo (Sin el +)</label>
                        <input type="text" id="c-telefono" required class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-fuchsia-400">
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs text-slate-400 mb-1">Eslogan o Descripción</label>
                    <input type="text" id="c-descripcion" required class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-yellow-400">
                </div>

                <!-- NUEVOS SELECTORES DE TEMA -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 border-y border-slate-800/50 py-4 my-2">
                    <div>
                        <label class="block text-xs text-cyan-400 font-bold mb-1">Tema: Catálogo Público 🛒</label>
                        <select id="c-tema-publico" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-cyan-400 transition-colors">
                            <option value="tornasol">✨ Tema Vibrante Suvlic</option>
                            <option value="oscuro">🌙 Tema Oscuro Estándar</option>
                            <option value="claro">☀️ Tema Claro Estándar</option>
                            <option value="personalizado">🎨 Tema Personalizado</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-fuchsia-400 font-bold mb-1">Tema: Panel Administrativo ⚙️</label>
                        <select id="c-tema-admin" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-fuchsia-400 transition-colors">
                            <option value="oscuro">🌙 Tema Oscuro (Defecto)</option>
                            <option value="tornasol">✨ Tema Vibrante Suvlic</option>
                            <option value="personalizado">🎨 Tema Personalizado</option>
                        </select>
                    </div>
                </div>

                <div id="custom-colors-container" class="hidden grid-cols-2 sm:grid-cols-4 gap-3 bg-[#0b0f19]/50 p-3 rounded-xl border border-slate-800">
                    <div class="flex flex-col items-center"><label class="text-[10px] text-slate-400 mb-1">Fondo Web</label><input type="color" id="col-bg" class="w-full h-8 cursor-pointer bg-transparent border-0 rounded"></div>
                    <div class="flex flex-col items-center"><label class="text-[10px] text-slate-400 mb-1">Tarjetas</label><input type="color" id="col-card" class="w-full h-8 cursor-pointer bg-transparent border-0 rounded"></div>
                    <div class="flex flex-col items-center"><label class="text-[10px] text-slate-400 mb-1">Textos</label><input type="color" id="col-text" class="w-full h-8 cursor-pointer bg-transparent border-0 rounded"></div>
                    <div class="flex flex-col items-center"><label class="text-[10px] text-slate-400 mb-1">Acentos</label><input type="color" id="col-accent" class="w-full h-8 cursor-pointer bg-transparent border-0 rounded"></div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Actualizar Logo</label>
                        <input type="file" id="c-logo-file" accept="image/*" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-fuchsia-500/10 file:text-fuchsia-400 hover:file:bg-fuchsia-500/20 file:transition-colors cursor-pointer">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">Actualizar Banner</label>
                        <input type="file" id="c-banner-file" accept="image/*" class="w-full text-xs text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-yellow-400/10 file:text-yellow-400 hover:file:bg-yellow-400/20 file:transition-colors cursor-pointer">
                    </div>
                </div>

                <button type="submit" id="btn-save-config" class="w-full bg-gradient-to-r from-fuchsia-500 via-cyan-400 to-yellow-400 hover:opacity-90 text-slate-900 font-extrabold text-xs py-3 rounded-xl transition-all shadow-[0_0_15px_rgba(217,70,239,0.2)]">
                    Guardar Cambios de Configuración
                </button>
            </form>
        </div>

        <!-- [CATEGORÍAS] -->
        <div class="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-xl">
            <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2 border-b border-slate-800 pb-3">
                <span>📁</span> Gestión de Categorías
            </h2>
            <form id="category-form" class="flex gap-3 mb-4">
                <div class="flex-1">
                    <input type="text" id="cat-nombre" required placeholder="Nueva categoría..." class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl p-2.5 text-sm text-white focus:outline-none focus:border-yellow-400 transition-colors">
                </div>
                <button type="submit" class="bg-yellow-400 hover:bg-yellow-300 text-slate-900 font-bold text-xs px-6 rounded-xl transition-colors">+ Crear</button>
            </form>
            <div class="border-t border-slate-800 pt-3">
                <div id="admin-categories-list" class="space-y-2 max-h-40 overflow-y-auto pr-2 hide-scrollbar"></div>
            </div>
        </div>

        <!-- [PUBLICADOR DE PRODUCTOS] -->
        <div class="bg-gradient-to-br from-slate-900 via-[#0b0f19] to-slate-900 rounded-2xl p-6 border border-slate-800 shadow-2xl relative overflow-hidden" id="product-form-section">
            <div class="absolute top-0 right-0 w-32 h-32 bg-cyan-500/5 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-fuchsia-500/5 rounded-full blur-3xl"></div>

            <h2 class="text-xl font-bold text-white mb-4 flex items-center justify-between border-b border-slate-800 pb-3 relative z-10">
                <div class="flex items-center gap-2"><span>📦</span> <span id="prod-form-title">Publicador de Productos</span></div>
                <button type="button" id="btn-cancel-edit" class="hidden text-xs text-red-400 font-bold bg-red-900/30 px-3 py-1 rounded-lg hover:bg-red-900/50 transition-colors">Cancelar ✖</button>
            </h2>

            <form id="prod-form" class="space-y-5 relative z-10">
                <input type="hidden" id="edit-prod-id" value="">
                <input type="hidden" id="edit-prod-img" value="">

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Nombre del Producto</label>
                        <input type="text" id="a-nombre" required class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-fuchsia-400 transition-colors">
                    </div>
                    <div>
                        <label class="block text-sm text-slate-400 mb-1">Categoría Asignada</label>
                        <select id="a-categoria" required class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-cyan-400 transition-colors"></select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm text-slate-400 mb-1">Descripción del Artículo</label>
                    <textarea id="a-descripcion" rows="2" required class="w-full bg-[#0b0f19] border border-slate-800 rounded-xl p-3 text-white focus:outline-none focus:border-yellow-400 transition-colors"></textarea>
                </div>

                <div class="border border-fuchsia-900/30 rounded-xl p-4 bg-slate-900/50 backdrop-blur-sm">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm font-bold bg-gradient-to-r from-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">🎨 Colores Disponibles (Opcional)</span>
                        <button type="button" id="btn-add-color" class="bg-fuchsia-500/10 text-fuchsia-400 hover:bg-fuchsia-500/20 text-xs font-bold py-2 px-3 rounded-lg border border-fuchsia-500/30 transition-all">
                            + Añadir Color
                        </button>
                    </div>
                    <div id="dynamic-colors-container" class="flex flex-wrap gap-4"></div>
                </div>

                <div class="border border-yellow-900/30 rounded-xl p-4 bg-slate-900/50 backdrop-blur-sm">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm font-bold bg-gradient-to-r from-yellow-400 to-fuchsia-400 bg-clip-text text-transparent">⚙️ Pasos de Selección Adicionales</span>
                        <button type="button" id="btn-add-caract" class="bg-yellow-400/10 text-yellow-400 hover:bg-yellow-400/20 text-xs font-bold py-2 px-3 rounded-lg border border-yellow-400/30 transition-all">
                            + Añadir Paso
                        </button>
                    </div>
                    <div id="dynamic-features-container" class="space-y-4"></div>
                </div>

                <div>
                    <label class="block text-sm text-slate-400 mb-1 flex justify-between">
                        <span>Imagen del Producto</span>
                        <span id="img-edit-status" class="text-cyan-400 text-xs hidden">Mantiene imagen actual</span>
                    </label>
                    <input type="file" id="a-file" accept="image/*" class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:bg-cyan-500/10 file:text-cyan-400 hover:file:bg-cyan-500/20 file:transition-colors cursor-pointer">
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-gradient-to-r from-fuchsia-500 via-cyan-400 to-yellow-400 text-slate-900 font-extrabold py-4 rounded-xl shadow-[0_0_20px_rgba(34,211,238,0.2)] hover:opacity-90 hover:scale-[1.01] transition-all">
                    Guardar Producto
                </button>
            </form>
        </div>

        <div class="bg-slate-900 rounded-2xl p-6 border border-slate-800 shadow-xl">
            <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2 border-b border-slate-800 pb-3">
                <span>🗑️</span> Inventario de Productos
            </h2>
            <div id="admin-products-list" class="space-y-3 max-h-96 overflow-y-auto pr-2 hide-scrollbar"></div>
        </div>

    </div>

    <!-- SCRIPT ACTUALIZADO -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, setDoc, getDoc, updateDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const firebaseConfig = {
            apiKey: "AIzaSyCYFyZbr_wM5FAMVo_hS1gY4hdAK-q41pk",
            authDomain: "suvlic-catalogo.firebaseapp.com",
            projectId: "suvlic-catalogo",
            storageBucket: "suvlic-catalogo.firebasestorage.app",
            messagingSenderId: "944310483909",
            appId: "1:944310483909:web:81852b2a7edb73e807e9ac"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const supabase = createClient('https://wwgbgfkukyjxvxtsantv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Z2JnZmt1a3lqeHZ4dHNhbnR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTE2MTgsImV4cCI6MjA5Nzk4NzYxOH0.KvgqVOgB8WLdmGlFf1SG57Gl6IEwm2sdAIzlM5v_0Q0');

        let productosGlobales = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("login-screen").classList.add("hidden");
                document.getElementById("admin-panel").classList.remove("hidden");
                document.body.className = "bg-[#0b0f19] text-slate-100 p-4 md:p-8 space-y-8 block";
                document.getElementById("user-display").textContent = `Conectado como: ${user.email}`;
                cargarConfiguracionActual();
                activarEscuchadoresEnTiempoReal();
            } else {
                document.getElementById("login-screen").classList.remove("hidden");
                document.getElementById("admin-panel").classList.add("hidden");
                document.body.className = "bg-[#0b0f19] text-slate-100 min-h-screen flex flex-col justify-center items-center p-4";
            }
        });

        document.getElementById("login-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn-login");
            btn.disabled = true; btn.textContent = "Validando...";
            try {
                await signInWithEmailAndPassword(auth, document.getElementById("l-email").value.trim(), document.getElementById("l-password").value);
                document.getElementById("login-form").reset();
            } catch (err) { alert("Acceso denegado."); } finally { btn.disabled = false; btn.textContent = "Iniciar Sesión"; }
        });

        document.getElementById("btn-logout").addEventListener("click", () => signOut(auth));

        // Listener para los nuevos selectores de tema
        const handleThemeChange = () => {
            const valPublico = document.getElementById("c-tema-publico").value;
            const valAdmin = document.getElementById("c-tema-admin").value;
            const customColorsBox = document.getElementById("custom-colors-container");
            
            if (valPublico === "personalizado" || valAdmin === "personalizado") {
                customColorsBox.classList.remove("hidden");
                customColorsBox.classList.add("grid");
            } else {
                customColorsBox.classList.add("hidden");
                customColorsBox.classList.remove("grid");
            }
        };

        document.getElementById("c-tema-publico").addEventListener("change", handleThemeChange);
        document.getElementById("c-tema-admin").addEventListener("change", handleThemeChange);

        async function cargarConfiguracionActual() {
            const docSnap = await getDoc(doc(db, "configuracion", "perfil"));
            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById("c-nombre").value = data.nombre || "";
                document.getElementById("c-telefono").value = data.telefono || "";
                document.getElementById("c-descripcion").value = data.descripcion || "";
                
                // Cargar temas por separado (con fallback si usabas 'tema' antes)
                document.getElementById("c-tema-publico").value = data.temaPublico || data.tema || "tornasol";
                document.getElementById("c-tema-admin").value = data.temaAdmin || "oscuro";
                
                handleThemeChange(); // Disparar revisión visual de la caja de colores

                if((data.temaPublico === "personalizado" || data.temaAdmin === "personalizado") && data.colores) {
                    document.getElementById("col-bg").value = data.colores.bg || "#0b0f19";
                    document.getElementById("col-card").value = data.colores.card || "#0f172a";
                    document.getElementById("col-text").value = data.colores.text || "#ffffff";
                    document.getElementById("col-accent").value = data.colores.accent || "#d946ef";
                }
            }
        }

        let listenCat = null, listenProd = null;
        function activarEscuchadoresEnTiempoReal() {
            if (listenCat) listenCat();
            if (listenProd) listenProd();

            listenCat = onSnapshot(collection(db, "categorias"), (snapshot) => {
                const select = document.getElementById("a-categoria");
                const catList = document.getElementById("admin-categories-list");
                select.innerHTML = '<option value="" disabled selected>-- Selecciona Categoría --</option>';
                catList.innerHTML = "";
                snapshot.docs.forEach(docSnap => {
                    const cat = docSnap.data();
                    select.innerHTML += `<option value="${docSnap.id}">${cat.nombre}</option>`;
                    const catDiv = document.createElement("div");
                    catDiv.className = "flex justify-between items-center bg-[#0b0f19] border border-slate-800 p-2 rounded-lg";
                    catDiv.innerHTML = `
                        <span class="text-xs font-bold text-white">${cat.nombre}</span>
                        <div class="flex gap-2">
                            <button onclick="editarCategoria('${docSnap.id}', '${cat.nombre}')" class="text-cyan-400 hover:text-cyan-300 text-[10px] font-bold px-2 py-1 bg-cyan-900/20 rounded border border-cyan-500/20">Editar</button>
                            <button onclick="eliminarCategoria('${docSnap.id}')" class="text-red-400 hover:text-red-300 text-[10px] font-bold px-2 py-1 bg-red-900/20 rounded border border-red-500/20">Borrar</button>
                        </div>
                    `;
                    catList.appendChild(catDiv);
                });
            });

            listenProd = onSnapshot(collection(db, "productos"), (snapshot) => {
                const listContainer = document.getElementById("admin-products-list");
                listContainer.innerHTML = "";
                productosGlobales = [];
                snapshot.docs.forEach(docSnap => {
                    const prod = docSnap.data();
                    prod.id = docSnap.id;
                    productosGlobales.push(prod);
                    const itemDiv = document.createElement("div");
                    itemDiv.className = "flex items-center justify-between p-3 bg-[#0b0f19] rounded-xl border border-slate-800 gap-3";
                    itemDiv.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <img src="${prod.imagenUrl || 'https://via.placeholder.com/50'}" class="w-10 h-10 object-cover rounded-lg border border-slate-800 flex-shrink-0">
                            <div class="overflow-hidden"><p class="text-sm font-bold text-white truncate">${prod.nombre}</p></div>
                        </div>
                        <div class="flex gap-2 flex-shrink-0">
                            <button onclick="cargarParaEditar('${prod.id}')" class="bg-cyan-500/10 text-cyan-400 text-xs font-bold py-2 px-3 rounded-lg border border-cyan-500/30 hover:bg-cyan-500/20 transition-all">Editar</button>
                            <button onclick="eliminarProducto('${prod.id}')" class="bg-red-600/10 text-red-400 text-xs font-bold py-2 px-3 rounded-lg border border-red-500/30 hover:bg-red-500/20 transition-all">Eliminar</button>
                        </div>
                    `;
                    listContainer.appendChild(itemDiv);
                });
            });
        }

        document.getElementById("config-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn-save-config");
            btn.disabled = true; btn.textContent = "Guardando...";
            try {
                let logoUrl = "", bannerUrl = "";
                const logoFile = document.getElementById("c-logo-file").files[0];
                const bannerFile = document.getElementById("c-banner-file").files[0];

                if (logoFile) {
                    const { error } = await supabase.storage.from('productos-imagenes').upload(`logo_${Date.now()}.${logoFile.type.split('/')[1]}`, logoFile);
                    logoUrl = supabase.storage.from('productos-imagenes').getPublicUrl(`logo_${Date.now()}.${logoFile.type.split('/')[1]}`).data.publicUrl;
                }
                if (bannerFile) {
                    const { error } = await supabase.storage.from('productos-imagenes').upload(`banner_${Date.now()}.${bannerFile.type.split('/')[1]}`, bannerFile);
                    bannerUrl = supabase.storage.from('productos-imagenes').getPublicUrl(`banner_${Date.now()}.${bannerFile.type.split('/')[1]}`).data.publicUrl;
                }

                const payload = {
                    nombre: document.getElementById("c-nombre").value.trim(),
                    telefono: document.getElementById("c-telefono").value.trim(),
                    descripcion: document.getElementById("c-descripcion").value.trim(),
                    // Guardar ambas configuraciones
                    temaPublico: document.getElementById("c-tema-publico").value,
                    temaAdmin: document.getElementById("c-tema-admin").value
                };

                // Si alguno de los dos temas es personalizado, guardar los colores
                if(payload.temaPublico === "personalizado" || payload.temaAdmin === "personalizado") {
                    payload.colores = { bg: document.getElementById("col-bg").value, card: document.getElementById("col-card").value, text: document.getElementById("col-text").value, accent: document.getElementById("col-accent").value };
                }

                if (logoUrl) payload.logoUrl = logoUrl;
                if (bannerUrl) payload.bannerUrl = bannerUrl;

                await setDoc(doc(db, "configuracion", "perfil"), payload, { merge: true });
                document.getElementById("c-logo-file").value = ""; document.getElementById("c-banner-file").value = "";
                alert("Configuración guardada exitosamente");
            } catch (err) { alert("Error: " + err.message); } finally { btn.disabled = false; btn.textContent = "Guardar Cambios de Configuración"; }
        });

        document.getElementById("category-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const input = document.getElementById("cat-nombre");
            await setDoc(doc(db, "categorias", input.value.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, "_")), { nombre: input.value.trim(), orden: Date.now() });
            input.value = "";
        });

        window.eliminarCategoria = async (id) => { if(confirm("¿Seguro?")) await deleteDoc(doc(db, "categorias", id)); };
        window.editarCategoria = async (id, actual) => { const n = prompt("Nuevo nombre:", actual); if(n) await updateDoc(doc(db, "categorias", id), { nombre: n.trim() }); };

        const cContainer = document.getElementById("dynamic-colors-container");
        function createColorBlock(colorHex = "#d946ef") {
            const div = document.createElement("div");
            div.className = "flex items-center gap-2 bg-[#0b0f19] p-2 rounded-lg border border-slate-800 color-block";
            div.innerHTML = `
                <input type="color" value="${colorHex}" class="c-hex w-8 h-8 cursor-pointer bg-transparent border-0 rounded">
                <button type="button" onclick="this.parentElement.remove()" class="text-slate-500 hover:text-red-400 text-xs px-2">✕</button>
            `;
            cContainer.appendChild(div);
        }
        document.getElementById("btn-add-color").onclick = () => createColorBlock();

        const fContainer = document.getElementById("dynamic-features-container");
        function createFeatureBlock(titulo = "", opciones = "") {
            const div = document.createElement("div");
            div.className = "p-3 bg-[#0b0f19] rounded-xl border border-slate-800 relative feature-block";
            div.innerHTML = `
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div><input type="text" value="${titulo}" required placeholder="Ej: Talla" class="f-titulo w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-yellow-400 transition-colors"></div>
                    <div><input type="text" value="${opciones}" required placeholder="Ej: S, M, L, XL" class="f-opciones w-full bg-slate-900 border border-slate-800 rounded-lg p-2 text-sm text-white focus:outline-none focus:border-cyan-400 transition-colors"></div>
                </div>
                <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-slate-500 hover:text-red-400 text-xs">✕</button>
            `;
            fContainer.appendChild(div);
        }
        document.getElementById("btn-add-caract").onclick = () => createFeatureBlock();

        window.cargarParaEditar = (id) => {
            const prod = productosGlobales.find(p => p.id === id);
            if(!prod) return;

            document.getElementById("edit-prod-id").value = id;
            document.getElementById("edit-prod-img").value = prod.imagenUrl || "";
            document.getElementById("a-nombre").value = prod.nombre;
            document.getElementById("a-categoria").value = prod.categoriaId;
            document.getElementById("a-descripcion").value = prod.descripcion;
            document.getElementById("a-file").value = "";
            
            fContainer.innerHTML = ""; cContainer.innerHTML = "";
            if(prod.caracteristicas && prod.caracteristicas.length > 0) prod.caracteristicas.forEach(c => createFeatureBlock(c.titulo, c.opciones.join(", ")));
            if(prod.colores && prod.colores.length > 0) prod.colores.forEach(c => createColorBlock(c));

            document.getElementById("prod-form-title").textContent = "Editando Producto...";
            document.getElementById("btn-submit").textContent = "Guardar Cambios del Producto";
            document.getElementById("btn-cancel-edit").classList.remove("hidden");
            document.getElementById("img-edit-status").classList.remove("hidden");
            document.getElementById("product-form-section").scrollIntoView({ behavior: 'smooth' });
        };

        document.getElementById("btn-cancel-edit").onclick = () => {
            document.getElementById("prod-form").reset();
            document.getElementById("edit-prod-id").value = "";
            document.getElementById("edit-prod-img").value = "";
            fContainer.innerHTML = ""; cContainer.innerHTML = "";
            document.getElementById("prod-form-title").textContent = "Publicador de Productos";
            document.getElementById("btn-submit").textContent = "Guardar Producto";
            document.getElementById("btn-cancel-edit").classList.add("hidden");
            document.getElementById("img-edit-status").classList.add("hidden");
        };

        document.getElementById("prod-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn-submit");
            const fileInput = document.getElementById("a-file");
            const editId = document.getElementById("edit-prod-id").value;
            let imgUrl = document.getElementById("edit-prod-img").value;

            if(!editId && !fileInput.files[0]) return alert("Selecciona una imagen");
            btn.disabled = true; btn.textContent = "Procesando...";

            try {
                if (fileInput.files[0]) {
                    const uniqueName = `${Date.now()}_prod.${fileInput.files[0].type.split('/')[1]}`;
                    await supabase.storage.from('productos-imagenes').upload(uniqueName, fileInput.files[0]);
                    imgUrl = supabase.storage.from('productos-imagenes').getPublicUrl(uniqueName).data.publicUrl;
                }

                const caract = [], colores = [];
                document.querySelectorAll(".feature-block").forEach(b => {
                    const t = b.querySelector(".f-titulo").value.trim(), o = b.querySelector(".f-opciones").value;
                    if (t && o) caract.push({ titulo: t, opciones: o.split(',').map(i => i.trim()).filter(i => i !== "") });
                });
                document.querySelectorAll(".color-block").forEach(b => colores.push(b.querySelector(".c-hex").value));

                const payload = {
                    nombre: document.getElementById("a-nombre").value.trim(),
                    categoriaId: document.getElementById("a-categoria").value,
                    descripcion: document.getElementById("a-descripcion").value.trim(),
                    imagenUrl: imgUrl,
                    caracteristicas: caract,
                    colores: colores,
                    activo: true
                };

                if (editId) await updateDoc(doc(db, "productos", editId), payload);
                else { payload.creadoEn = new Date(); await addDoc(collection(db, "productos"), payload); }

                document.getElementById("btn-cancel-edit").click();
            } catch (err) { alert("Error: " + err.message); } finally { btn.disabled = false; }
        });

        window.eliminarProducto = async (id) => { if (confirm("¿Eliminar?")) await deleteDoc(doc(db, "productos", id)); };
    </script>
</body>
</html>
